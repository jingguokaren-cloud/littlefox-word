<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Fox L1 - Mrs. Kelly's Class</title>
  <style>
    :root {
      --primary: #FF7E67;
      --primary-hover: #FF6B52;
      --secondary: #A2D5F2;
      --accent: #FFD166;
      --background: #F4F9F9;
      --text-main: #333333;
      --text-light: #777777;
      --card-bg: rgba(255, 255, 255, 0.9);
      --success: #06D6A0;
      --danger: #EF476F;
      font-family: 'Comic Sans MS', 'Quicksand', 'Nunito', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--background);
      background-image: radial-gradient(var(--secondary) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-main);
      min-height: 100vh;
    }

    * { box-sizing: border-box; }

    .app-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
    }

    .header-title {
      margin: 0;
      color: var(--primary);
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
    }

    .nav-links { display: flex; gap: 15px; }

    .nav-link {
      color: var(--text-main);
      font-weight: bold;
      padding: 8px 15px;
      border-radius: 15px;
      cursor: pointer;
      background: #f0f0f0;
      transition: all 0.2s;
    }

    .nav-link:hover {
      background: var(--primary);
      color: white;
    }

    .glass-card {
      background: var(--card-bg);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      border: 2px solid white;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 5px 15px rgba(255, 126, 103, 0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--secondary);
      color: #1A5F7A;
    }

    /* Accordion Styles */
    .accordion-item {
      margin-bottom: 10px;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid #e0e0e0;
    }

    .accordion-header {
      padding: 15px 20px;
      background: #fafafa;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
      transition: background 0.2s;
    }

    .accordion-header:hover {
      background: #f0f0f0;
    }

    .accordion-content {
      padding: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .icon {
      transition: transform 0.3s;
    }

    .icon.open {
      transform: rotate(180deg);
    }

    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .lesson-card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      border: 2px solid #f0f0f0;
    }

    .lesson-badge {
      background: var(--secondary);
      color: #1A5F7A;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: bold;
      align-self: center;
    }
    
    .mode-btn {
      background: var(--background);
      border: 1px solid var(--secondary);
      padding: 10px 5px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: all 0.2s;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    
    .mode-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .option-card {
      background: white;
      border: 3px solid var(--secondary);
      border-radius: 20px;
      padding: 20px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      transition: all 0.2s;
    }
    
    .option-card:hover:not(:disabled) {
      transform: translateY(-5px);
      border-color: var(--primary);
    }

    .option-card.correct { background: var(--success); border-color: var(--success); color: white; }
    .option-card.wrong { background: var(--danger); border-color: var(--danger); color: white; }
    .option-card:disabled { cursor: not-allowed; }

    .question-container { text-align: center; margin-bottom: 30px; }
    .question-text { font-size: 2.5rem; color: var(--primary); margin: 20px 0; }
    .listen-btn { width: 80px; height: 80px; border-radius: 50%; font-size: 2rem; cursor: pointer;}
    
    .fav-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px; background: white; border-radius: 15px;
      border-left: 5px solid var(--accent); margin-bottom: 15px;
    }
  </style>
</head>

","words":[{"english":"have","chinese":"有,拥有"},{"english":"yogurt","chinese":"酸奶,优酪乳"},{"english":"favorite","chinese":"最喜欢的东西(人)"},{"english":"sandwich","chinese":"三明治"},{"english":"donut","chinese":"甜甜圈 (=doughnut)"},{"english":"cookie","chinese":"饼干"},{"english":"Hooray!","chinese":"耶!(高兴时的欢呼)"}]},{"lessonNumber":30,"title":"What Time Is It?","words":[{"english":"time","chinese":"时间，时刻"},{"english":"one","chinese":"⼀，1"},{"english":"o'clock","chinese":"…点钟"},{"english":"line","chinese":"up 排队"},{"english":"Excuse","chinese":"不好意思，对不起"},{"english":"two","chinese":"⼆，2"},{"english":"three","chinese":"三，3"},{"english":"children","chinese":"孩⼦们 (单数:child)"},{"english":"four","chinese":"四，4"},{"english":"go","chinese":"去"},{"english":"home","chinese":"在家，回家"},{"english":"good-bye","chinese":"再见"},{"english":"go","chinese":"home 回家"}]},{"lessonNumber":31,"title":"What Day Is It Today?","words":[{"english":"day","chinese":"天,日子"},{"english":"today","chinese":"今天"},{"english":"Tuesday","chinese":"星期二"},{"english":"mom","chinese":"妈妈"},{"english":"Wednesday","chinese":"星期三"},{"english":"Thursday","chinese":"星期四"},{"english":"school","chinese":"学校"},{"english":"Friday","chinese":"星期五"},{"english":"on vacation","chinese":"在度假中"},{"english":"play","chinese":"玩耍,游戏"}]},{"lessonNumber":32,"title":"What Do You Do on Mondays?","words":[{"english":"Monday","chinese":"星期一"},{"english":"play","chinese":"1. 同...比赛,玩(游戏等),(2. 玩耍,游戏)"},{"english":"badminton","chinese":"羽毛球"},{"english":"soccer","chinese":"足球"},{"english":"with","chinese":"与,和"},{"english":"ping-pong","chinese":"桌球,乒乓球"},{"english":"Sunday","chinese":"星期日"},{"english":"baseball","chinese":"棒球运动,(棒球的)球"}]},{"lessonNumber":33,"title":"It's His Video","words":[{"english":"whose","chinese":"谁的"},{"english":"comic","chinese":"连环漫画的"},{"english":"book","chinese":"书"},{"english":"his","chinese":"他的"},{"english":"video","chinese":"录影机,录影带"},{"english":"computer game","chinese":"电脑游戏"}]},{"lessonNumber":34,"title":"Open the Window","words":[{"english":"hot","chinese":"热的"},{"english":"open","chinese":"打开"},{"english":"window","chinese":"窗户"},{"english":"okay","chinese":"可以。(=OK)"},{"english":"please","chinese":"请(请求别人时所用的话)"},{"english":"turn off","chinese":"关闭,关掉(水源、煤气、电源等)"},{"english":"light","chinese":"灯"},{"english":"sorry","chinese":"抱歉的"},{"english":"turn on","chinese":"打开(水源、煤气、电源等)"},{"english":"TV","chinese":"电视 (=television)"},{"english":"computer","chinese":"电脑"},{"english":"get off","chinese":"从(车子等)下来"},{"english":"table","chinese":"桌子,餐桌"}]},{"lessonNumber":35,"title":"What Does He Do?","words":[{"english":"who","chinese":"谁"},{"english":"he","chinese":"他"},{"english":"uncle","chinese":"1. 伯父,叔父,姑父,(2. 叔叔,伯伯(对长者的称呼))"},{"english":"does","chinese":"做"},{"english":"bus","chinese":"公车"},{"english":"driver","chinese":"司机"},{"english":"she","chinese":"她"},{"english":"aunt","chinese":"姨母,姑母,婶母"},{"english":"police officer","chinese":"警官,警员"},{"english":"cool","chinese":"1. 很棒的,极好的,(2. 凉快的)"}]},{"lessonNumber":36,"title":"I Don't Like Salad","words":[{"english":"we","chinese":"我们"},{"english":"hungry","chinese":"肚子饿的"},{"english":"like","chinese":"喜欢"},{"english":"chicken","chinese":"鸡肉"},{"english":"don&#x27;t","chinese":"不... (=do not)"},{"english":"salad","chinese":"沙拉(混合各种蔬菜搭配酱料的食物)"},{"english":"noodle","chinese":"(常用复数)面条"},{"english":"want","chinese":"要,想要"},{"english":"lunch","chinese":"午餐时间"},{"english":"be over","chinese":"结束"}]}]};
    const appRoot = document.getElementById('app-root');
    
    let favorites = JSON.parse(localStorage.getItem('littleFoxFavorites')) || {};

    function saveFavorites() {
      localStorage.setItem('littleFoxFavorites', JSON.stringify(favorites));
    }

    function addFavorite(word, lessonTitle) {
      favorites[word.english] = { ...word, lessonTitle, streak: 0 };
      saveFavorites();
    }

    function recordCorrect(english) {
      if (!favorites[english]) return;
      favorites[english].streak = (favorites[english].streak || 0) + 1;
      if (favorites[english].streak >= 3) {
        delete favorites[english];
      }
      saveFavorites();
    }

    function speak(text) {
      const audioUrl = 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2';
      const audio = new Audio(audioUrl);
      
      audio.play().catch(e => {
        console.warn("Youdao audio failed, falling back to browser TTS", e);
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        
        let ttsText = text === 'I' ? 'eye' : text;
        
        const utterance = new SpeechSynthesisUtterance(ttsText);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      });
    }

    function toggleAccordion(id, iconId) {
      const el = document.getElementById(id);
      const icon = document.getElementById(iconId);
      if (el.style.display === 'none') {
        el.style.display = 'block';
        icon.classList.add('open');
      } else {
        el.style.display = 'none';
        icon.classList.remove('open');
      }
    }

    // --- VIEWS ---

    function renderDirectory() {
      let lessonsHtml = '';
      vocabularyData.lessons.forEach(lesson => {
        lessonsHtml += `
          <div class="lesson-card" onclick="startQuiz(${lesson.lessonNumber})">
            <div style="text-align:center; margin-bottom:15px;">
              <span class="lesson-badge">Lesson ${lesson.lessonNumber}</span>
              <div style="font-size:1.2rem;font-weight:bold;margin:10px 0">${lesson.title}</div>
              <div style="color:var(--text-light);font-size:0.9rem">${lesson.words.length} words</div>
            </div>
          </div>
        `;
      });

      let html = `
        <div class="glass-card">
          <h2 style="color:var(--primary);margin-top:0">Directory</h2>
          <p>Select a lesson and practice mode below!</p>

          <div class="accordion-item">
            <div class="accordion-header" onclick="toggleAccordion('level-l1', 'icon-l1')">
              <span>📁 Level: ${vocabularyData.level}</span>
              <span class="icon" id="icon-l1">▼</span>
            </div>
            <div class="accordion-content" id="level-l1" style="display:none; background: #fdfdfd;">
              
              <div class="accordion-item" style="margin-bottom: 0;">
                <div class="accordion-header" onclick="toggleAccordion('series-mrs', 'icon-series')" style="background: #f9f9f9;">
                  <span>🎬 Animation: ${vocabularyData.series}</span>
                  <span class="icon" id="icon-series">▼</span>
                </div>
                <div class="accordion-content" id="series-mrs" style="display:none;">
                  <div class="lessons-grid">
                    ${lessonsHtml}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      `;
      appRoot.innerHTML = html;
      
      toggleAccordion('level-l1', 'icon-l1');
      toggleAccordion('series-mrs', 'icon-series');
    }

    // --- QUIZ ENGINE ---
    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;
    let currentMode = '';
    let currentLessonTitle = '';

    function startQuiz(lessonNumber) {
      const lesson = vocabularyData.lessons.find(l => l.lessonNumber === lessonNumber);
      currentLessonTitle = lesson ? lesson.title : 'Favorites Practice';
      score = 0;
      currentQIndex = 0;
      
      const modes = ['listen-to-word', 'read-to-meaning', 'listen-to-meaning', 'meaning-to-word'];
      let finalQuestions = [];
      
      modes.forEach(mode => {
        let modePool = [];
        lesson.words.forEach(word => {
          let distractors = lesson.words.filter(w => w.english !== word.english);
          if (distractors.length < 3) {
            const otherWords = vocabularyData.lessons.filter(l => l.lessonNumber !== lesson.lessonNumber).flatMap(l => l.words);
            const extra = [...otherWords].sort(() => Math.random() - 0.5).slice(0, 3 - distractors.length);
            distractors = [...distractors, ...extra];
          }
          distractors = distractors.sort(() => Math.random() - 0.5).slice(0, 3);
          const options = [word, ...distractors].sort(() => Math.random() - 0.5);
          modePool.push({ answer: word, options, mode: mode });
        });
        finalQuestions = finalQuestions.concat(modePool.sort(() => Math.random() - 0.5));
      });

      currentQuestions = finalQuestions;
      renderQuestion();
    }

    function renderQuestion() {
      if (currentQIndex >= currentQuestions.length) {
        renderResults();
        return;
      }

      const q = currentQuestions[currentQIndex];
      const mode = q.mode;
      
      if (mode === 'listen-to-word' || mode === 'listen-to-meaning') {
        speak(q.answer.english);
      }

      let questionHtml = '';
      if (mode === 'listen-to-word' || mode === 'listen-to-meaning') {
        questionHtml = `<button class="btn listen-btn" onclick="speak('${q.answer.english.replace(/'/g, "\'")}')">🔊</button>`;
      } else if (mode === 'read-to-meaning') {
        questionHtml = `<div class="question-text">${q.answer.english}</div>`;
      } else if (mode === 'meaning-to-word') {
        questionHtml = `<div class="question-text" style="font-size:1.8rem">${q.answer.chinese}</div>`;
      }

      let optionsHtml = '';
      q.options.forEach((opt, idx) => {
        const text = (mode === 'listen-to-word' || mode === 'meaning-to-word') ? opt.english : opt.chinese;
        optionsHtml += `<button class="option-card" id="opt-${idx}" onclick="handleAnswer(${idx}, '${opt.english.replace(/'/g, "\'")}')">${text}</button>`;
      });

      appRoot.innerHTML = `
        <div class="glass-card">
          <div style="display:flex;justify-content:space-between;color:var(--text-light);margin-bottom:20px">
            <span>Question ${currentQIndex + 1} of ${currentQuestions.length}</span>
            <span>Score: ${score}</span>
          </div>
          <div class="question-container">${questionHtml}</div>
          <div class="options-grid">${optionsHtml}</div>
          <div id="next-container" style="display:none;justify-content:center;margin-top:30px">
            <button class="btn" onclick="renderQuestion()">Next Question ➡</button>
          </div>
        </div>
      `;
    }

    function handleAnswer(selectedIdx, selectedEnglish) {
      const q = currentQuestions[currentQIndex];
      const correctEnglish = q.answer.english;
      
      q.options.forEach((opt, idx) => {
        const btn = document.getElementById(`opt-${idx}`);
        btn.disabled = true;
        if (opt.english === correctEnglish) {
          btn.classList.add('correct');
        } else if (idx === selectedIdx && opt.english !== correctEnglish) {
          btn.classList.add('wrong');
        }
      });

      if (selectedEnglish === correctEnglish) {
        score++;
        if (currentLessonTitle === 'Favorites Practice') recordCorrect(correctEnglish);
      } else {
        addFavorite(q.answer, currentLessonTitle === 'Favorites Practice' ? q.answer.lessonTitle : currentLessonTitle);
      }

      currentQIndex++;
      const nextBtnContainer = document.getElementById('next-container');
      nextBtnContainer.style.display = 'flex';
      
      if (currentQIndex >= currentQuestions.length) {
        nextBtnContainer.innerHTML = '<button class="btn" onclick="renderQuestion()">View Results</button>';
      }
    }

    function renderResults() {
      appRoot.innerHTML = `
        <div class="glass-card" style="text-align:center">
          <h2 style="font-size:2rem;color:var(--primary)">Quiz Complete!</h2>
          <p style="font-size:1.2rem">You scored ${score} out of ${currentQuestions.length}</p>
          <div style="display:flex;gap:15px;justify-content:center;margin-top:30px">
            <button class="btn btn-secondary" onclick="renderDirectory()">Back to Directory</button>
          </div>
        </div>
      `;
    }

    // --- FAVORITES ---
    function renderFavorites() {
      const favArray = Object.values(favorites);
      let html = `
        <div class="glass-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <h2 style="color:var(--primary);margin:0">⭐ My Favorites</h2>
            ${favArray.length > 0 ? '<button class="btn" onclick="startFavQuiz()">Practice Now</button>' : ''}
          </div>
      `;

      if (favArray.length === 0) {
        html += '<p style="text-align:center;color:var(--text-light);margin-top:40px">You have no favorited words yet. Keep practicing!</p>';
      } else {
        favArray.forEach(fav => {
          let dots = '';
          for(let i=1; i<=3; i++) {
            dots += `<div style="width:12px;height:12px;border-radius:50%;background:${i <= fav.streak ? 'var(--success)' : '#e0e0e0'}"></div>`;
          }
          
          html += `
            <div class="fav-item">
              <div>
                <div style="display:flex;align-items:center;gap:10px">
                  <strong style="font-size:1.2rem">${fav.english}</strong>
                  <button style="background:none;border:none;cursor:pointer;font-size:1.2rem" onclick="speak('${fav.english.replace(/'/g, "\'")}')">🔊</button>
                </div>
                <div style="color:var(--text-light);font-size:0.9rem;margin-top:5px">${fav.chinese}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:0.85rem;color:var(--text-light)">${fav.lessonTitle}</div>
                <div style="display:flex;gap:5px;margin-top:5px;justify-content:flex-end">${dots}</div>
              </div>
            </div>
          `;
        });
      }

      html += '</div>';
      appRoot.innerHTML = html;
    }

    function startFavQuiz() {
      const favArray = Object.values(favorites);
      if (favArray.length === 0) return;

      currentLessonTitle = 'Favorites Practice';
      score = 0;
      currentQIndex = 0;

      const modes = ['listen-to-word', 'read-to-meaning', 'listen-to-meaning', 'meaning-to-word'];
      const allWords = vocabularyData.lessons.flatMap(l => l.words);
      let finalQuestions = [];
      
      modes.forEach(mode => {
        let modePool = [];
        favArray.forEach(answer => {
          let distractors = allWords.filter(w => w.english !== answer.english).sort(() => Math.random() - 0.5).slice(0, 3);
          const options = [answer, ...distractors].sort(() => Math.random() - 0.5);
          modePool.push({ answer, options, mode: mode });
        });
        finalQuestions = finalQuestions.concat(modePool.sort(() => Math.random() - 0.5));
      });

      currentQuestions = finalQuestions;
      renderQuestion();
    }

    // Init
    renderDirectory();
  </script>
</body>
</html>
